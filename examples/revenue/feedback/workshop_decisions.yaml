decisions:
  - metric: Pipeline Value
    status: Proposed
    owner: Marketing
    owner_confirmed: true
    source_of_truth: mart.marketing_sourced_pipeline
    definition: >-
      Weighted value of open, qualified marketing-sourced opportunities.
    logic_formula: >-
      Sum opportunity amount multiplied by stage probability for open,
      qualified marketing-sourced opportunities.
    grain: Opportunity by reporting month
    time_basis: Opportunity snapshot month
    approved_use: Pipeline planning and forecast discussion
    not_approved_use: Financial reporting or reporting actual revenue
    naming_decision: Rename "Pipeline Revenue" to "Pipeline Value"
    related_metrics:
      - Booked Revenue
      - Recognised Revenue
    caveats:
      - Pipeline value is not realised revenue.
      - Values change as opportunity stages and probabilities change.
    review_cadence: Quarterly
